<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Dependency Gantt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-b" aria-hidden="true"></div>

  <header class="app-title-bar">
    <input id="app-title" class="app-title-input" type="text" value="Project Timeline" aria-label="Chart title" spellcheck="false" />
  </header>

  <main class="layout">
    <section class="runtime-notice" id="runtime-notice" hidden>
      <h2>Load Task Data</h2>
      <p id="runtime-message"></p>
      <label class="file-picker" for="local-data-file">Choose data.json</label>
      <input id="local-data-file" type="file" accept=".json,application/json,.ndjson,text/plain" />
      <p class="runtime-hint">When this page is opened with <span>file://</span>, browsers block automatic reads from nearby files. A local server still works best, but you can also pick data.json here.</p>
    </section>

    <details class="settings-drawer">
      <summary class="settings-drawer-toggle" aria-label="Open settings" title="Settings">⚙</summary>
      <div class="zoom-controls">
        <button data-zoom="Day">Day</button>
        <button data-zoom="Week">Week</button>
        <button data-zoom="Month">Month</button>
        <div class="column-width-controls" aria-label="Gantt column width controls">
          <button id="column-width-minus" type="button" aria-label="Decrease column width">-</button>
          <span id="column-width-value">Cols: 34px</span>
          <button id="column-width-plus" type="button" aria-label="Increase column width">+</button>
        </div>
        <div class="column-width-controls" aria-label="Gantt row height controls">
          <button id="row-height-minus" type="button" aria-label="Decrease row height">-</button>
          <span id="row-height-value">Row: 36px</span>
          <button id="row-height-plus" type="button" aria-label="Increase row height">+</button>
        </div>
        <button id="dependency-toggle" type="button">Deps: All</button>
        <button id="refresh-data" type="button">Refresh from URL</button>
        <button id="reset-layout" type="button">Reset Layout</button>
        <button id="load-json" type="button">Load JSON</button>
        <button id="download-json" type="button">Download JSON</button>
      </div>
    </details>

    <section class="panel chart-panel">
      <div id="gantt"></div>
    </section>

    <section class="panel data-panel">
      <h2>Current Task JSON</h2>
      <pre id="task-json" aria-live="polite"></pre>
    </section>
  </main>

  <div id="task-modal" class="task-modal" hidden>
    <div class="task-modal-backdrop" data-modal-close></div>
    <div class="task-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="task-modal-title">
      <header class="task-modal-header">
        <h2 id="task-modal-title">Edit Task</h2>
        <button type="button" class="task-modal-close" data-modal-close aria-label="Close">×</button>
      </header>
      <div class="task-modal-body">
        <div class="task-modal-field task-modal-field--full">
          <label for="tm-title">Title</label>
          <input id="tm-title" type="text" spellcheck="false" />
        </div>
        <div class="task-modal-field">
          <label for="tm-id">ID</label>
          <input id="tm-id" type="text" readonly />
        </div>
        <div class="task-modal-field">
          <label for="tm-group">Group</label>
          <input id="tm-group" type="text" spellcheck="false" />
        </div>
        <div class="task-modal-field">
          <label for="tm-assignee">Assignee</label>
          <input id="tm-assignee" type="text" spellcheck="false" />
        </div>
        <div class="task-modal-field">
          <label for="tm-progress">Progress (%)</label>
          <input id="tm-progress" type="number" min="0" max="100" step="1" />
        </div>
        <div class="task-modal-field">
          <label for="tm-start">Start</label>
          <input id="tm-start" type="date" />
        </div>
        <div class="task-modal-field">
          <label for="tm-end">End</label>
          <input id="tm-end" type="date" />
        </div>
        <div class="task-modal-field">
          <label for="tm-duration">Duration (days)</label>
          <input id="tm-duration" type="number" min="1" step="1" />
        </div>
        <div class="task-modal-field task-modal-field--check">
          <label for="tm-milestone"><input id="tm-milestone" type="checkbox" /> Milestone</label>
        </div>
        <div class="task-modal-field task-modal-field--full">
          <label for="tm-deps">Blocked by (task IDs, comma-separated)</label>
          <input id="tm-deps" type="text" spellcheck="false" />
        </div>
        <div class="task-modal-field task-modal-field--full">
          <label for="tm-blocking">Blocking (task IDs, comma-separated)</label>
          <input id="tm-blocking" type="text" spellcheck="false" />
        </div>
        <div class="task-modal-field task-modal-field--full">
          <label for="tm-description">Description</label>
          <textarea id="tm-description" rows="3" spellcheck="false"></textarea>
        </div>
      </div>
      <footer class="task-modal-footer">
        <button type="button" class="task-modal-delete" id="tm-delete">Delete task</button>
        <div class="task-modal-actions">
          <button type="button" class="task-modal-cancel" data-modal-close>Cancel</button>
          <button type="button" class="task-modal-save" id="tm-save">Save</button>
        </div>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.js"></script>
  <script id="gantt-settings-script" src="./settings.js"></script>
  <script src="./app.js"></script>
</body>
</html>
